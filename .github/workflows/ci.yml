# CI (design/windows-port.md W15): every push builds both platforms and runs
# the shared core selftest; a v* tag additionally packages the Windows zip +
# installer and attaches them to the GitHub release. macOS release stays
# manual (release.sh needs the signing/notarization credentials).

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: ./build.sh
      - name: Core selftest (shared with Windows)
        run: |
          mkdir -p /tmp/pmf-selftest
          PMF_SAVE_DIR=/tmp/pmf-selftest \
            ./PokemonMouseFollower.app/Contents/MacOS/PokemonMouseFollower --selftest-core
      - name: Raising selftest
        run: |
          PMF_SAVE_DIR=/tmp/pmf-selftest \
            ./PokemonMouseFollower.app/Contents/MacOS/PokemonMouseFollower --selftest-raising

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: compnerd/gha-setup-swift@v3
        with:
          branch: swift-6.3.3-release
          tag: 6.3.3-RELEASE
      - name: Build (ci flavor keeps the console for selftest output)
        run: .\build.ps1 ci
        shell: pwsh
      - name: Core selftest (shared with macOS)
        run: |
          New-Item -ItemType Directory -Force "$env:TEMP\pmf-selftest" | Out-Null
          $env:PMF_SAVE_DIR = "$env:TEMP\pmf-selftest"
          & .\build-win\PokemonMouseFollower\PokemonMouseFollower.exe --selftest-core
        shell: pwsh
      - name: Smoke run (300 ticks)
        run: |
          $env:PMF_DEV = "1"
          & .\build-win\PokemonMouseFollower\PokemonMouseFollower.exe --smoke 300
        shell: pwsh

  windows-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: compnerd/gha-setup-swift@v3
        with:
          branch: swift-6.3.3-release
          tag: 6.3.3-RELEASE
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Package (zip + installer)
        run: .\build.ps1 package
        shell: pwsh
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --verify-tag --generate-notes `
              --title "${{ github.ref_name }}"
          }
          gh release upload "${{ github.ref_name }}" `
            (Get-Item build-win\PokemonMouseFollower-*-windows.zip).FullName `
            build-win\PokemonMouseFollower-Setup.exe --clobber
        shell: pwsh
