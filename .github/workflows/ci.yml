# CI (design/windows-port.md W15): every push builds both platforms and runs
# the shared core selftest + cross-OS parity diff. Releases are NOT built
# here: the ROM-extracted effect sprites (gamedata/effects/) are never
# committed, so a CI-built package would ship without them. Each OS releases
# from a real machine — macOS via release.sh, Windows via release.ps1 — on
# independent version tracks.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: ./build.sh
      - name: Core selftest (shared with Windows)
        run: |
          mkdir -p /tmp/pmf-selftest
          PMF_SAVE_DIR=/tmp/pmf-selftest \
            ./PokemonMouseFollower.app/Contents/MacOS/PokemonMouseFollower --selftest-core
      - name: Raising selftest
        run: |
          PMF_SAVE_DIR=/tmp/pmf-selftest \
            ./PokemonMouseFollower.app/Contents/MacOS/PokemonMouseFollower --selftest-raising
      - name: Parity fixture dump (W18-2)
        run: |
          ./PokemonMouseFollower.app/Contents/MacOS/PokemonMouseFollower --dump-parity 12345 > parity-macos.txt
          tail -1 parity-macos.txt
      - uses: actions/upload-artifact@v4
        with:
          name: parity-macos
          path: parity-macos.txt

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: compnerd/gha-setup-swift@v0.4.0
        with:
          branch: swift-6.3.3-release
          tag: 6.3.3-RELEASE
      - name: Build (ci flavor keeps the console for selftest output)
        run: .\build.ps1 ci
        shell: pwsh
      - name: Core selftest (shared with macOS)
        run: |
          New-Item -ItemType Directory -Force "$env:TEMP\pmf-selftest" | Out-Null
          $env:PMF_SAVE_DIR = "$env:TEMP\pmf-selftest"
          & .\build-win\PokemonMouseFollower\PokemonMouseFollower.exe --selftest-core
        shell: pwsh
      - name: Smoke run (300 ticks)
        run: |
          $env:PMF_DEV = "1"
          & .\build-win\PokemonMouseFollower\PokemonMouseFollower.exe --smoke 300
        shell: pwsh
      - name: Parity fixture dump (W18-2)
        run: |
          # cmd-level redirect: PowerShell's > writes UTF-16 and would break the diff
          cmd /c ".\build-win\PokemonMouseFollower\PokemonMouseFollower.exe --dump-parity 12345 > parity-windows.txt"
          Get-Content parity-windows.txt -Tail 1
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: parity-windows
          path: parity-windows.txt

  # The engine is shared code — a seeded battle must replay bit-identically on
  # both platforms (design/windows-port.md W18-2). Any divergence fails here.
  parity:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: parity-*
          merge-multiple: true
      - name: Compare event logs
        run: |
          sed -i 's/\r$//' parity-windows.txt   # normalize CRLF just in case
          diff -u parity-macos.txt parity-windows.txt
          echo "parity OK: $(wc -l < parity-macos.txt) lines identical"
